version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: agora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agora_dev
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora -d agora_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: