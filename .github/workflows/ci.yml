name: Back CI — AGORA

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Tests Spring Boot (profil test)
  # Objectif : démarrer le contexte Spring sans dépendance externe.
  # Note : les tests d'intégration PostgreSQL seront ajoutés plus tard (tags).
  # ─────────────────────────────────────────
  test:
    name: Tests (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -q
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2 : Build Maven (jar)
  # S'exécute seulement si les tests passent
  # ─────────────────────────────────────────
  build:
    name: Build Maven package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package
        run: ./mvnw clean package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agora-back-jar-${{ github.sha }}
          path: target/*.jar
          retention-days: 3