name: Back CI — AGORA

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Tests Spring Boot avec PostgreSQL
  # Valide que le contexte Spring démarre correctement
  # TODO: ajouter des tests unitaires (sans DB) quand ils existeront
  # TODO: séparer unit-tests / integration-tests quand @Tag("integration") sera utilisé
  # ─────────────────────────────────────────
  test:
    name: Tests (Spring Boot + PostgreSQL)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agora_dev
          POSTGRES_USER: agora
          POSTGRES_PASSWORD: agora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/agora_dev
          SPRING_DATASOURCE_USERNAME: agora
          SPRING_DATASOURCE_PASSWORD: agora

      - name: Upload Surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2 : Build Maven (jar)
  # S'exécute seulement si les tests passent
  # ─────────────────────────────────────────
  build:
    name: Build Maven package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package
        run: ./mvnw clean package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: agora-back-jar-${{ github.sha }}
          path: target/*.jar
          retention-days: 3